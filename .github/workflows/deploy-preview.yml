name: Deploy Preview Site

on:
  push:
    branches: [main]
    paths:
      - 'preview/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: preview/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: preview
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: preview
        run: pnpm run build

      # Merge existing docs/ site with preview/ build output
      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp -r docs/* _site/
          cp -r preview/dist/ _site/preview/

      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
